name: Mermaid Maker 
description: Convert mermaid files into image formats.
inputs:
  input_dir:
    description: |
     The input directory for mermaid files. Defaults to "all",
     i.e. all changed files with input_file_extension across the whole repo.
    required: false
    default: "all"

  input_file_extension:
    description: The extension of the mermaid files. 
    required: false
    default: "mmd"

  output_dir:
    description: |
      The output directory for generated mermaid files. Defaults to "same",
      i.e. converted files will be placed in the same directory as their source files.
    required: false
    default: "same" 

  output_file_extension:
    description: |
      The output format of the generated mermaid files. Only "svg", "png"and "pdf" are accepted. 
    required: false
    default: "svg"

  commit_message:
    description: |
      The commit message used for commiting mermaid files into the repository. 
      Defaults to: "feat: Convert `input_file_extension` file(s) to `output_file_extension`".
    required: false
    default: ""

  pkg_manager_install_cmd:
    description: |
      The node package manager's command to install a package.
      Examples:
        - "npm install"   # for npm
        - "pnpm install"  # for pnpm
        - "yarn install"  # for yarn
        - "bun install"   # for bun
    required: false
    default: "npm install"

  pkg_manager_run_cmd:
    description: | 
      The node package manager's command to run an installed, local package. 
      Examples:
        - "npx"   # for npm
        - "pnpm"  # for pnpm
        - "yarn dlx"  # for yarn
        - "bunx"    # for barn
    required: false
    default: "npx"

branding:
  icon: arrow-down-circle
  color: purple

runs:
  using: composite
  steps:
    - name: get directory names to check for changes
      run: |
        if [[ ${{inputs.input_dir}} == "all" ]]; then
          echo "files_to_check=**.${{inputs.input_file_extension}}" >> "$GITHUB_OUTPUT"
        else
          echo "files_to_check=${{inputs.input_dir}}/**.${{inputs.input_file_extension}}" >> "$GITHUB_OUTPUT"
        fi
      id: get-files-to-check
      shell: bash

    ## check for changes files and exit early with no changes
    - uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
      id: changed_files
      with: 
        files: ${{steps.get-files-to-check.outputs.files_to_check}}
        since_last_remote_commit: "true"

    # env variable is used to skip browser download, to instead use caching mechanisms
    - if: ${{steps.changed_files.outputs.any_changed == 'true'}}
      name: install mermaid
      run: PUPPETEER_SKIP_DOWNLOAD='true' ${{inputs.pkg_manager_install_cmd}} @mermaid-js/mermaid-cli@11.16.0
      shell: bash

    - if: ${{steps.changed_files.outputs.any_changed == 'true'}}
      name: 'Cache mermaid browser'
      uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        # pin mermaid browser to mermaid version
        # in the future, this should be automated
        key: mermaid-maker-chrome-browser-11.16.0
        path: mermaid-maker-chrome-browser
      id: chrome_browser_download

    - if: ${{steps.chrome_browser_download.outputs.cache-hit != 'true' && steps.changed_files.outputs.any_changed == 'true'}}
      name: install browser if doesnt exist
      run: PUPPETEER_CACHE_DIR='./mermaid-maker-chrome-browser' ${{inputs.pkg_manager_run_cmd}} puppeteer browsers install
      shell: bash

    - if: ${{steps.chrome_browser_download.outputs.cache-hit != 'true' && steps.changed_files.outputs.any_changed == 'true'}}
      name: 'cache mermaid browser'
      uses: actions/cache/save@v6.1.0
      with:
        key: mermaid-maker-chrome-browser-11.16.0
        path: mermaid-maker-chrome-browser

      # basic though process for next step:
      # if output_dir is the same:
        # generate file with new suffix
      # if output_dir diff
        # extract file name
        # place under new dir
        # generate file with new suffix 
      
    - if: ${{steps.changed_files.outputs.any_changed == 'true'}}
      id: mermaid-gen
      name: Generate mermaid diagrams
      env:
        ALL_CHANGED_FILES: ${{steps.changed_files.outputs.all_changed_files}}
      run: |

        # create output_file_array to save all the names of outputted files
        # this array will later be used to git add all of them to repo
        output_file_arr=()

        # generate mermaid diagram for each changed file
        for file in ${ALL_CHANGED_FILES}; do
          # get the file's basename (just the file's name), and remove final suffix
          file_basename=$(basename -s ".${{inputs.input_file_extension}}" "${file}")
          # get the file's dirname (just the dir path)
          file_dirname=$(dirname "${file}")

          if [[ "${{inputs.output_dir}}" == "same" ]]; then
            # keep the same dirname
            output_file="${file_dirname}/${file_basename}.${{inputs.output_file_extension}}"
            output_file_arr+=("$output_file")

            # use env variable to specify custom browser location
            # use aa-exec --profile chrome to sandbox puppeteer's chrome executoin
            # generate output files with transparent background
            PUPPETEER_CACHE_DIR=mermaid-maker-chrome-browser aa-exec --profile=chrome mmdc -i "$file" -o "$output_file" -b transparent
          else

            # use user specified output dir
            output_file="${{inputs.output_dir}}/${file_basename}.${{inputs.output_file_extension}}"
            output_file_arr+=("$output_file")
            PUPPETEER_CACHE_DIR=mermaid-maker-chrome-browser aa-exec --profile=chrome ${{inputs.pkg_manager_run_cmd}} mmdc -i "$file" -o "$output_file" -b transparent
          fi
        done

        # jq commmand Source - https://stackoverflow.com/a/67489301
        # Posted by Weeble, modified by community. See post 'Timeline' for change history
        # Retrieved 2026-07-09, License - CC BY-SA 4.0
        # goal: save OUTPUTTED_FILES as json array
        echo "OUTPUTTED_FILES=$(jq --compact-output --null-input '$ARGS.positional' --args -- "${output_file_arr[@]}")" >> "$GITHUB_OUTPUT"
      shell: bash
    
    - if: ${{inputs.commit_message == '' && steps.changed_files.outputs.any_changed == 'true'}}
      name: set commit message
      id: COMMIT_MSG
      run: |
        echo "SET_COMMIT_MSG='feat: Convert .${{inputs.input_file_extension}} file(s) to ${{inputs.output_file_extension}}'" >> "$GITHUB_OUTPUT"
      shell: bash

    - if: ${{steps.changed_files.outputs.any_changed == 'true'}}
      uses: EndBug/add-and-commit@290ea2c423ad77ca9c62ae0f5b224379612c0321 # v10.0.0
      with:
        message: ${{steps.COMMIT_MSG.outputs.SET_COMMIT_MSG}}
        # the github action will run git add for each file in the array
        add: ${{steps.mermaid-gen.outputs.OUTPUTTED_FILES}}
